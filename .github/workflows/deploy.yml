name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PAGES_REPO: otter-assistant/otter-assistant.github.io
  NODE_VERSION: 18

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Pages Repository
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # 配置 git
          git config --global user.name "Otter Assistant"
          git config --global user.email "otter.assistant@outlook.com"
          
          # 清理旧的目录
          rm -rf pages-repo
          
          # 使用 token 克隆（确保正确的远程）
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/${PAGES_REPO}.git pages-repo
          
          # 进入 pages 仓库目录
          cd pages-repo
          
          # 验证 origin 指向正确的仓库
          echo "Remote origin:"
          git remote -v
          
          # 复制编译后的文件（从父目录）
          rm -rf ./*
          rm -rf ./.* 2>/dev/null || true
          cp -r ../dist/* ./
          cp -r ../dist/.* ./ 2>/dev/null || true
          
          # 添加所有文件
          git add -A
          
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # 提交
          git commit -m "Deploy: $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 推送到 origin main
          git push origin main
