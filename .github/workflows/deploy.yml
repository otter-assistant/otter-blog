name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PAGES_REPO: otter-assistant/otter-assistant.github.io
  NODE_VERSION: 18

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Pages Repository
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # 配置 git
          git config --global user.name "Otter Assistant"
          git config --global user.email "otter.assistant@outlook.com"
          
          # 克隆 Pages 仓库
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/${PAGES_REPO}.git pages-repo
          
          # 复制编译后的文件
          rm -rf pages-repo/*
          rm -rf pages-repo/.* 2>/dev/null || true
          cp -r dist/* pages-repo/
          cp -r dist/.* pages-repo/ 2>/dev/null || true
          
          # 进入 pages 仓库目录
          cd pages-repo
          
          # 添加所有文件
          git add -A
          
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # 提交并推送
          git commit -m "Deploy: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
