name: Build and Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 18
  CONTENT_REPO: https://github.com/otter-assistant/otter-content.git
  CONTENT_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Sync Content from otter-content
        run: npx tsx scripts/sync-content.ts
        env:
          CONTENT_REPO: ${{ env.CONTENT_REPO }}
          CONTENT_BRANCH: ${{ env.CONTENT_BRANCH }}

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: './dist'

  # 部署任务 - 推送到 otter-assistant.github.io
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: './dist'

      - name: Checkout Pages Repository
        uses: actions/checkout@v4
        with:
          repository: otter-assistant/otter-assistant.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: './pages-repo'

      - name: Deploy to Pages Repository
        run: |
          cd pages-repo
          # 删除旧文件（保留 .git 目录）
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          # 复制新文件
          cp -r ../dist/* .
          # 提交并推送
          git config user.name "otter-assistant"
          git config user.email "otter.assistant@outlook.com"
          git add -A
          git commit -m "Deploy from otter-blog: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
